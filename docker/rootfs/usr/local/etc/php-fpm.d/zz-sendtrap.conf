; Sendtrap Community php-fpm pool (Plan 06 Phase 7 §1.3 / §1.5).
; The minimal master starts as container root so it can open inherited log
; descriptors; every request worker runs as `sendtrap`. Listens on a unix
; socket under /tmp (tmpfs) so the rootfs stays read-only. Logs to stderr.

[global]
daemonize = no
error_log = /proc/self/fd/2
; Surface a dead pool as a container-level failure rather than silently
; degrading — s6 restarts the service.
emergency_restart_threshold = 5
emergency_restart_interval = 1m
process_control_timeout = 10s

[www]
user = sendtrap
group = sendtrap
listen = /tmp/php-fpm.sock
listen.owner = sendtrap
listen.group = sendtrap
listen.mode = 0660
chdir = /app

; Keep the resolved container env (APP_KEY etc.) available to workers.
clear_env = no

pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Ship worker stdout/stderr to the container log.
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
