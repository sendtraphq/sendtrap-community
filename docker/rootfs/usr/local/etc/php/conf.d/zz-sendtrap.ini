; Sendtrap Community runtime PHP settings (Plan 06 Phase 7 §1.2).

; The SMTP daemon advertises SIZE up to ~25MiB; allow the web/API upload path
; and PHP memory to comfortably handle a large message + its attachments.
memory_limit = 256M
upload_max_filesize = 30M
post_max_size = 30M
expose_php = Off

; opcache — production PHP performance (§1.2, optional-but-enabled).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; The app source is immutable in the image, so never stat files for changes.
opcache.validate_timestamps = 0
