# Sendtrap Community — nginx (Plan 06 Phase 7 §1.3). The minimal master starts
# as container root so it can open inherited log descriptors, then every
# request worker runs as `sendtrap`. It listens on :8080 and fastcgi-passes PHP
# to php-fpm over a unix socket. All writable paths live under /tmp (tmpfs), so
# the rootfs stays read-only. Logs go to stdout/stderr for `docker logs`.

user sendtrap sendtrap;
worker_processes auto;
daemon off;
pid /tmp/nginx.pid;
error_log stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Writable scratch under the /tmp tmpfs (read-only rootfs).
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Accept messages up to the SMTP max size when proxying API/UI uploads.
    client_max_body_size 30m;

    server {
        listen 8080;
        server_name _;
        root /app/public;
        index index.php;

        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass unix:/tmp/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
